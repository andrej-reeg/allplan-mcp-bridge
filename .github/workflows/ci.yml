name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run mypy src

  thread-safety:
    name: Threading law enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Listener must not import _allplan shim
        run: |
          ! grep -rn "^\s*from.*_allplan import\|^\s*import.*_allplan" \
            src/allplan_agent/listener.py \
            src/allplan_agent/command_queue.py \
            2>/dev/null

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit tests/integration --cov=src --cov-report=term-missing --cov-fail-under=0
